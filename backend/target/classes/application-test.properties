spring.application.name=qa-command-center
server.port=8088

# MongoDB - using embedded for testing
spring.data.mongodb.uri=mongodb://localhost:27017/qa_command_center
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration

# JWT
jwt.secret=qa-command-center-super-secret-key-2024-change-in-production
jwt.expiration=86400000

# Anthropic AI
anthropic.api.key=YOUR_ANTHROPIC_API_KEY_HERE
anthropic.model=claude-sonnet-4-20250514

# CORS
cors.allowed.origins=http://localhost:3000

# Logging
logging.level.com.qa=DEBUG
logging.level.org.springframework.security=DEBUG

spring.main.allow-circular-references=true
